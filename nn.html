<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model Dashboard</title>
    <!-- นำเข้า Tailwind CSS เพื่อความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- นำเข้า Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-4xl w-full bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
        <!-- Header Section -->
        <div class="p-6 bg-slate-800 border-b border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-wide">Teachable Machine AI</h1>
                <p class="text-sm text-slate-400 mt-1">โมเดลวิเคราะห์รูปภาพผ่านกล้อง Webcam (อัปเดตทุกๆ 3 วินาที)</p>
            </div>
            <button type="button" onclick="init()" id="btn-start" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/30 transition-all duration-200 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                เริ่มเปิดกล้อง
            </button>
        </div>

        <!-- Main Content Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6">
            <!-- Left Column: Webcam Card -->
            <div class="flex flex-col items-center justify-center bg-slate-900/50 rounded-xl p-4 border border-slate-700/50 min-h-[300px]">
                <h2 class="text-sm font-semibold text-slate-400 mb-3 tracking-wider uppercase">กล้องวิดีโอ</h2>
                <div id="webcam-container" class="relative rounded-lg overflow-hidden border-2 border-indigo-500/30 shadow-inner bg-slate-950">
                    <!-- จะใส่ Canvas จากกล้องตรงนี้ -->
                    <div id="webcam-placeholder" class="w-[250px] h-[250px] flex items-center justify-center text-slate-500 text-sm italic">
                        กดปุ่มเพื่อเริ่มทำงาน
                    </div>
                </div>
            </div>

            <!-- Right Column: Results Card -->
            <div class="flex flex-col bg-slate-900/50 rounded-xl p-6 border border-slate-700/50">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-semibold text-slate-400 tracking-wider uppercase">ผลการวิเคราะห์</h2>
                    <span id="status-tag" class="text-xs px-2 py-1 bg-slate-800 text-slate-400 rounded-md border border-slate-700">สแตนด์บาย</span>
                </div>
                <div id="label-container" class="space-y-4 flex-1 flex flex-col justify-center">
                    <p class="text-slate-500 text-center italic">ระบบกำลังรอข้อมูลภาพ...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/DRKNK5ORB/";
        let model, webcam, labelContainer, maxPredictions;
        let predictionInterval;

        async function init() {
            // เปลี่ยนสถานะปุ่มและแสดงสถานะกำลังโหลด
            const btnStart = document.getElementById("btn-start");
            btnStart.disabled = true;
            btnStart.innerHTML = "กำลังโหลดโมเดล...";
            btnStart.className = "px-6 py-3 bg-slate-700 text-slate-400 font-semibold rounded-xl cursor-not-allowed flex items-center gap-2";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true; 
                webcam = new tmImage.Webcam(250, 250, flip); // ปรับขนาดหน้าจอเป็น 250x250 ให้พอดีกับการจัดหน้า
                await webcam.setup(); 
                await webcam.play();

                // เคลียร์คอมโพเนนต์เก่าออก
                document.getElementById("webcam-placeholder").style.display = "none";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; // ล้างตัวหนังสือ placeholder ออก

                // สร้างโครงสร้าง Progress Bar สำหรับการทำนายแต่ละอันเพื่อให้สวยงาม
                for (let i = 0; i < maxPredictions; i++) {
                    const progressWrapper = document.createElement("div");
                    progressWrapper.className = "w-full";
                    progressWrapper.innerHTML = `
                        <div class="flex justify-between text-sm mb-1">
                            <span class="font-medium text-slate-300" id="class-name-${i}">กำลังโหลด...</span>
                            <span class="font-bold text-indigo-400" id="class-percent-${i}">0%</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-2.5 border border-slate-700 overflow-hidden">
                            <div class="bg-indigo-500 h-2.5 rounded-full transition-all duration-500" id="class-bar-${i}" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(progressWrapper);
                }

                // ปรับเปลี่ยนสถานะมุมบนขวาเป็น "กำลังทำงาน"
                const statusTag = document.getElementById("status-tag");
                statusTag.innerHTML = "กำลังทำงาน";
                statusTag.className = "text-xs px-2 py-1 bg-emerald-500/10 text-emerald-400 rounded-md border border-emerald-500/20 flex items-center gap-1.5";
                statusTag.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>กำลังทำงาน`;

                // เปลี่ยน UI ปุ่มเป็นปิดใช้งานเรียบร้อย
                btnStart.innerHTML = "กล้องทำงานอยู่";

                // เริ่มลูปอัปเดตเฟรมกล้องแบบ Real-time เพื่อให้ภาพในจอลื่นไหลไม่กระตุก
                window.requestAnimationFrame(loop);

                // แยกการทำนายดึงความน่าจะเป็นออกมารัน "ทุกๆ 3 วินาที (3000 ms)" ตามที่โจทย์กำหนด
                predictionInterval = setInterval(async () => {
                    await predict();
                }, 3000);

                // ทำการทำนายครั้งแรกทันที ไม่ต้องรอครบ 3 วินาทีแรก
                await predict();

            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดโมเดลหรือกล้อง:", error);
                alert("ไม่สามารถเข้าถึงกล้องหรือโหลดโมเดลได้ กรุณาตรวจสอบสิทธิ์การเข้าถึงกล้องของคุณ");
                btnStart.disabled = false;
                btnStart.innerHTML = "ลองใหม่อีกครั้ง";
                btnStart.className = "px-6 py-3 bg-red-600 hover:bg-red-500 text-white font-semibold rounded-xl shadow-lg";
            }
        }

        async function loop() {
            webcam.update(); // ควบคุมให้เฟรมภาพหน้ากล้องวิดีโออัปเดตตลอดเวลา (ลื่นไหล 60fps)
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันนี้จะรันเฉพาะตอนโดน setInterval เรียกทุกๆ 3 วินาที
        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0);

                // อัปเดตข้อมูลลง UI ในแท่ง Progress bar ของเรา
                document.getElementById(`class-name-${i}`).innerText = className;
                document.getElementById(`class-percent-${i}`).innerText = percentage + "%";
                
                const progressBar = document.getElementById(`class-bar-${i}`);
                progressBar.style.width = percentage + "%";

                // เปลี่ยนสีแถบตามความแม่นยำ (ถ้าความมั่นใจเกิน 70% ให้เป็นสีเขียว ถ้าต่ำกว่าให้เป็นสีม่วงอินดิโก้)
                if (probability > 0.7) {
                    progressBar.className = "bg-emerald-500 h-2.5 rounded-full transition-all duration-500";
                } else {
                    progressBar.className = "bg-indigo-500 h-2.5 rounded-full transition-all duration-500";
                }
            }
        }
    </script>
</body>
</html>
