<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Princess - Image Analyzer</title>
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- นำเข้า Google Fonts หวานๆ สไตล์เจ้าหญิง -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Mitr', 'Itim', sans-serif; }
        .princess-gradient {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #f9bec7 100%);
        }
        .magic-glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.4);
        }
        /* แอนิเมชันหัวใจลอยคลอเบาๆ */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating-item { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="princess-gradient min-h-screen flex flex-col items-center justify-center p-4 md:p-8 relative overflow-x-hidden">

    <!-- มงกุฎและประกายตกแต่งพื้นหลัง -->
    <div class="absolute top-4 left-4 text-pink-300 text-3xl opacity-40 floating-item">✨</div>
    <div class="absolute bottom-6 right-8 text-pink-300 text-4xl opacity-40 floating-item" style="animation-delay: 1.5s;">👑</div>

    <div class="max-w-3xl w-full magic-glass rounded-3xl shadow-xl shadow-pink-300/30 overflow-hidden border-2 border-pink-200">
        
        <!-- Header Section สไตล์เจ้าหญิง -->
        <div class="p-6 bg-white/40 border-b border-pink-200 text-center relative">
            <div class="inline-block text-3xl mb-1 floating-item">👑</div>
            <h1 class="text-2xl font-bold text-pink-600 tracking-wide drop-shadow-sm">กระจกวิเศษบอกข้าเถิด</h1>
            <p class="text-sm text-pink-500/80 mt-1 font-light">ระบบร่ายมนตร์วิเคราะห์ภาพถ่าย (ทำนายทุกๆ 3 วินาที)</p>
            
            <!-- ปุ่มกดสไตล์โบว์ริบบิ้นหวานๆ -->
            <div class="mt-4 flex justify-center">
                <button type="button" onclick="init()" id="btn-start" class="px-8 py-3 bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 active:transform active:scale-95 text-white font-medium rounded-full shadow-md shadow-pink-400/30 border-2 border-white transition-all duration-200 flex items-center gap-2">
                    <span class="text-lg">✨</span> เริ่มเปิดกระจกวิเศษ
                </button>
            </div>
        </div>

        <!-- Main Content Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6">
            
            <!-- โซนกล้องวิดีโอ (กรอบกระจกเจ้าหญิง) -->
            <div class="flex flex-col items-center bg-white/50 rounded-2xl p-4 border border-pink-100">
                <h2 class="text-sm font-medium text-pink-600 mb-3 flex items-center gap-1">
                    <span>🎀</span> ภาพจากกระจกเงา
                </h2>
                <div id="webcam-container" class="relative rounded-2xl overflow-hidden border-4 border-pink-300/60 shadow-inner bg-pink-50/50 flex items-center justify-center w-[220px] h-[220px]">
                    <div id="webcam-placeholder" class="text-pink-400 text-sm text-center p-4 font-light">
                        <p class="text-2xl mb-1">🔮</p>
                        รอเจ้าหญิงเปิดกล้อง...
                    </div>
                </div>
            </div>

            <!-- โซนผลลัพธ์คำทำนาย -->
            <div class="flex flex-col bg-white/50 rounded-2xl p-5 border border-pink-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-medium text-pink-600 flex items-center gap-1">
                        <span>🪄</span> คำทำนายของเวทมนตร์
                    </h2>
                    <span id="status-tag" class="text-xs px-2.5 py-1 bg-pink-100 text-pink-500 rounded-full border border-pink-200">เตรียมพร้อม</span>
                </div>
                
                <!-- กล่องบรรจุแท่งพลังงานความมั่นใจ -->
                <div id="label-container" class="space-y-4 flex-1 flex flex-col justify-center">
                    <p class="text-pink-400/70 text-center text-sm font-light italic">โปรดเปิดกล้องเพื่อให้กระจกเริ่มทำนาย...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts จากต้นฉบับ -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/DRKNK5ORB/";
        let model, webcam, labelContainer, maxPredictions;
        let predictionInterval;

        async function init() {
            const btnStart = document.getElementById("btn-start");
            btnStart.disabled = true;
            btnStart.innerHTML = "🔮 กำลังเสกมนตร์โหลดโมเดล...";
            btnStart.className = "px-8 py-3 bg-pink-300 text-white font-medium rounded-full cursor-not-allowed border-2 border-white/50";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true; 
                webcam = new tmImage.Webcam(220, 220, flip); // ขนาดกล้องปรับให้พอดีเฟรม 220x220
                await webcam.setup(); 
                await webcam.play();

                // ซ่อนข้อความ placeholder แล้วแสดงผลกล้อง
                document.getElementById("webcam-placeholder").style.display = "none";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; 

                // สร้างแถบพลังเวทมนตร์ (Progress Bar สีชมพู/ทอง)
                for (let i = 0; i < maxPredictions; i++) {
                    const progressWrapper = document.createElement("div");
                    progressWrapper.className = "w-full";
                    progressWrapper.innerHTML = `
                        <div class="flex justify-between text-xs md:text-sm mb-1">
                            <span class="font-medium text-pink-700" id="class-name-${i}">กำลังร่ายเวท...</span>
                            <span class="font-bold text-rose-500" id="class-percent-${i}">0%</span>
                        </div>
                        <div class="w-full bg-pink-100/80 rounded-full h-3 border border-pink-200 overflow-hidden shadow-inner">
                            <div class="bg-gradient-to-r from-pink-400 to-rose-400 h-3 rounded-full transition-all duration-500" id="class-bar-${i}" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(progressWrapper);
                }

                // เปลี่ยนแปลงสถานะมุมขวาบน
                const statusTag = document.getElementById("status-tag");
                statusTag.className = "text-xs px-2.5 py-1 bg-amber-100 text-amber-600 rounded-full border border-amber-200 flex items-center gap-1 font-medium animate-pulse";
                statusTag.innerHTML = `✨ กำลังร่ายมนตร์`;

                btnStart.innerHTML = "💖 กระจกวิเศษเปิดใช้งานแล้ว";

                // ให้หน้าจอวิดีโอเคลื่อนไหวลื่นไหลตามเฟรมปกติ
                window.requestAnimationFrame(loop);

                // ตั้งเวลาการทำนาย (Predict) ใหม่ทุกๆ 3 วินาที (3000 มิลลิวินาที)
                predictionInterval = setInterval(async () => {
                    await predict();
                }, 3000);

                // เรียกทำงานครั้งแรกทันทีโดยไม่ต้องรอ 3 วินาทีแรก
                await predict();

            } catch (error) {
                console.error("เกิดข้อผิดพลาด:", error);
                alert("โอ๊ะโอ! กระจกวิเศษไม่สามารถส่องดูได้ กรุณาอนุญาตให้เข้าถึงกล้องถ่ายภาพของคุณก่อนนะเจ้าคะ");
                btnStart.disabled = false;
                btnStart.innerHTML = "🪄 ลองร่ายมนตร์อีกครั้ง";
                btnStart.className = "px-8 py-3 bg-gradient-to-r from-pink-400 to-rose-400 text-white font-medium rounded-full shadow-md";
            }
        }

        async function loop() {
            webcam.update(); // เฟรมวิดีโอยังคงอัปเดตต่อเนื่องเพื่อให้ไม่กระตุก
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันคำนวณจาก AI จะทำงานทุกๆ 3 วินาทีตามที่ตั้งค่าไว้ใน setInterval
        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0);

                // แสดงข้อมูลลงในหน้าจอเจ้าหญิง
                document.getElementById(`class-name-${i}`).innerText = "✨ " + className;
                document.getElementById(`class-percent-${i}`).innerText = percentage + "%";
                
                const progressBar = document.getElementById(`class-bar-${i}`);
                progressBar.style.width = percentage + "%";

                // ปรับเปลี่ยนสีแถบพลังหาก AI มั่นใจเกิน 75% ให้เปลี่ยนเป็นแถบประกายสีทองหรูหรา
                if (probability > 0.75) {
                    progressBar.className = "bg-gradient-to-r from-amber-400 to-yellow-500 h-3 rounded-full transition-all duration-500 shadow-[0_0_8px_rgba(245,158,11,0.5)]";
                } else {
                    progressBar.className = "bg-gradient-to-r from-pink-400 to-rose-400 h-3 rounded-full transition-all duration-500";
                }
            }
        }
    </script>
</body>
</html>
